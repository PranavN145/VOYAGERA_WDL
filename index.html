<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOYAGERA</title>
    <link rel="stylesheet" href="css/land.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
</head>

<body>
    <header>
        <div class="finisher-header" style="width: 100%; height: 100vh; position: relative;  background: url('images/earth1.png') center -68% / 110% auto no-repeat;">
            <section class="hero" style="position: relative; z-index: 1;">
                <span class="label">See more than destinations</span>
                <h1>VOYAGERA</h1>
                <p class="desc">Discover the world differently</p>
                <a class="btn" href="pages/home.html">Explore</a>
            </section>
        </div>
    </header>
    <script src="finisher-header.es5.min.js" type="text/javascript"></script>
    <script type="text/javascript">
        new FinisherHeader({
          "count": 100,
          "size": { "min": 2, "max": 6, "pulse": 0 },
          "speed": {
            "x": { "min": 0, "max": 0.4 },
            "y": { "min": 0, "max": 0.6 }
          },
          "colors": {
            "background": "#0f0d26",
            "particles": ["#ffffff", "#d7f3fe", "#ffd0a7"]
          },
          "blending": "overlay",
          "opacity": { "center": 1, "edge": 0 },
          "skew": 0,
          "shapes": ["c"]
        });
    </script>
</body>

</html>
